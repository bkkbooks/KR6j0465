body:
  text: 失譯人名今附梁録如是我聞一時佛在王舍城迦蘭陀竹林中爾時王舍城內有一比丘為賊所劫為蛇所螫為鬼所嬈受大苦惱爾時鬼神大將阿吒婆拘見是比丘受如是苦心生憐愍即往佛所至佛所已頭面禮足在一面立白佛言世尊以降伏一切極惡諸鬼神等我今憐愍一切衆生故為降伏一切諸惡鬼神及一切惡人惡毒等故上佛世尊極嚴惡呪以用降伏諸鬼神等若有讀誦是呪之者其人威德乃至力能降伏梵天何況餘惡爾時佛告阿吒婆拘鬼神大將我不須此極嚴惡呪儻能傷害諸衆生等爾時阿吒婆拘重白佛言世尊後惡世之中惡鬼增盛惡人衆多惡毒蟲獸侵害衆生或值諸難所謂王賊水火刀兵恐畏怨憎惡鬼等難若佛弟子出家在家若住寂靜乞食道人冢間樹下四部等衆若行曠野山林道中若在城邑村里巷陌當為救護不令遇惡世尊慈矜願垂納受善逝世尊願垂顧録爾時世尊聞是語已默然受之爾時阿吒婆拘見佛默然心懷喜悅即於佛前而說呪曰豆留咩豆留咩陀咩陀咩豆留咩豆留咩豆留咩豆留咩豆留彌隸尼利尼利尼利那羅那羅那羅尼利尼利尼利尼利那羅㝹富尼利豆留茶濘豆留茶濘摩訶豆留茶濘豆留茶濘究吒濘究吒濘摩訶究吒濘多吒濘多吒濘摩訶多吒濘多吒濘吒吒吒吒吒吒吒吒摩訶吒吒吒吒阿毗阿毗摩訶阿毗阿毗阿毗利阿毗利摩訶阿毗利阿毗利阿婆阿毗阿婆阿毗阿婆阿毗阿婆阿毗律師律師摩訶律師律師梨濘梨濘摩訶梨濘梨濘首婁首婁摩訶首婁首婁仇婁仇婁摩訶仇婁仇婁留仇牟留仇牟留仇牟留仇牟仇摩仇摩仇摩仇摩唏利唏利唏利唏利伊持伊持伊持伊持比持比持比持比持呵羅呵羅呵羅呵羅唏泥唏泥唏泥唏泥休泥休泥休泥醯泥醯泥呵那呵那呵那呵那牟尼牟尼牟尼牟尼摩訶牟尼牟尼娑羅娑羅娑羅娑羅尸利睱究那反路迦遮利蛇時那時那時那時那無沙婆那暮蛇修迦都多牟尼迦羅摩迦羅摩迦羅摩闍竭提多蛇奢摩陀摩奢摩陀摩奢摩陀摩閻摩陀摩閻摩陀摩奢摩目多彌提那婆羅闍那咩富留沙多摩牟尼那毗闍那彌修伽都多牟尼那毗闍那咩莎呵世尊此陀羅尼句為一切衆生作護作救護持是人悉皆令得安隱寂靜令離衰惱滅諸惡毒離諸苦惱王難賊難怨憎之難若天龍鬼神羅剎夜叉鳩槃茶復多那阿跋漆羅呿屈陀如是等所觸惱者所侵損者悉得除滅又復世間一切諸毒芳草若木根華果衣裳飲食世間之物及蟲鳥禽獸諸能為毒惡傷人者悉令消壞不能為惡又復虛空日月星辰旋嵐風輪鬼神起風欲來傷人諸鬼神等欲來求食吸人精氣食人肉血者令人疫病熱病若一日二日三日四日乃至七日或令冷病風病濕病寒冷等病若身內若身外一切衆病若七日若十六日悉令消滅不能為害是等諸鬼神若以手若以口若以腳若以舌若以心欲惱人者及以惡人欲為人作惱害者先當誦此呪力能噤持令彼惡人惡鬼噤碎失念不令為惡世尊我今當更說神呪以守護之阿車阿車瞋彌反牟尼牟尼摩訶牟尼牟尼䉛烏力反尼休休摩訶那迦休休鬪伽那知阿呼阿伽那知阿多那知阿吒阿吒那吒那吒留豆留豆留豆休休豆留唏泥唏泥唏泥唏泥郁仇摩仇摩仇摩仇摩唏梨唏梨唏梨唏梨尼利尼利摩訶尼利莎訶此陀羅尼為受持讀誦者作護若有鬼食人精氣若損人資産耗人財物如是一切衆怖怨等悉為結界今為某國某甲合家無量作大擁護今當重更說防諸惡呪即說呪曰留牟留牟留牟留牟留摩留摩留摩留摩唏梨唏梨唏梨唏梨唏梨唏梨仇那仇那仇那仇那仇那仇㝹仇㝹仇㝹仇㝹仇留仇留仇留仇留休婁休婁休婁休婁唏梨暮休暮休暮休暮休暮唏梨暮唏梨暮唏梨暮唏梨休牟休牟休牟休摩休咩提摩咩思摩阿提迦羅咩兜莎訶爾時大將重白佛言世尊此呪極有神力如上所說莫令持此呪者有王畏賊畏火畏水畏風毒刀兵等畏日月星辰鬼神等畏或有餘惡知識心生忿姤意生惡害欲相侵惱者當先誦此呪為其結界當令彼惡鬼惡人仇怨之人心生侵惡者令其愚癡迷悶噤碎自遇衆惡不越此界不能侵犯誦此呪者世尊若有善男子善女人誦此呪者一切天龍阿修羅諸惡鬼神人非人等皆悉隨侍擁護不令遇惡世尊我是鬼神大將力能降伏一切諸惡鬼若有誦此呪者我當將諸鬼神晝夜不離擁護其人令不見惡不令惡鬼惡人得其便也若侵損惱害誦此呪者我當以千輻輪轢碎其頭令諸鬼神為作衰害世尊此呪極有神力極有威德唯願流布施衆安樂世尊誦此呪者其人德力唯佛知之世尊此大神呪應付賢德有智善人若不能誦者應以好紙書寫盛以綵囊著種種香常持隨身若有憂怖恐難常當憶念此呪無不消滅世尊若有事難憂怖惡鬼神惡夢欲令消滅者先當結界使諸惡不起令彼惡人惡鬼惡賊自受其殃身體燋枯心意狂亂欲結界之時應淨洗浴著淨衣服好淨塗地安七器漿飲二器著少血飲二器著種種漿飲然八燈燒熏陸香運心供養我將諸鬼神至其邊施其所願其人應誦此呪結赤縷然後持行即能消除一切諸難爾時佛告阿難此呪極有大神力能消除一切諸難并諸時惡擁護衆生多所利益汝好受持廣令流布若有城邑村落誦此呪者莫不蒙利若有國王大臣誦此呪者其人境土無有惡賊怖難災橫疾疫水旱風霜若遇惡賊應誦此呪若繫著高幢頭賊見此幢賊尋退散降伏阿難此呪極有神力極有大德應令四衆善誦持之爾時衆會聞佛所說歡喜奉行此中丹本有注云牛屎作場外灰緣竪二刀十二隻箭請婆拘法餘如前部誦三遍結縷十二結
